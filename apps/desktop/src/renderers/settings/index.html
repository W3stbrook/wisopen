<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; connect-src http: https:;" />
    <title>Wisopen Settings</title>
    <link rel="stylesheet" href="../shared-ui/app.css" />
    <style>
      body { display: grid; grid-template-columns: 200px 1fr; height: 100vh; }
      nav { background: var(--panel); border-right: 1px solid var(--border); padding: 16px 10px; }
      nav h1 { font-size: 16px; padding: 0 8px 12px; }
      nav button { display: block; width: 100%; text-align: left; border: none; background: transparent; padding: 8px 10px; border-radius: 8px; margin-bottom: 2px; color: var(--muted); }
      nav button.active { background: var(--panel-2); color: var(--fg); }
      main { padding: 24px 28px; overflow: auto; }
      .add-row { display: grid; grid-template-columns: 1fr 1fr auto auto; gap: 8px; margin-top: 10px; align-items: end; }
    </style>
  </head>
  <body>
    <nav id="nav">
      <h1>Wisopen</h1>
    </nav>
    <main id="main"></main>
    <div class="toast" id="toast"></div>
    <script type="module" src="./settings.ts"></script>
  </body>
</html>
