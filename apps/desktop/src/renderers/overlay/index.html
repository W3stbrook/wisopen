<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline';" />
    <title>Wisopen overlay</title>
    <link rel="stylesheet" href="./overlay.css" />
  </head>
  <body>
    <div class="pill" id="pill">
      <span class="dot" id="dot"></span>
      <span class="label" id="label">Listening…</span>
      <span class="meter" id="meter"><i></i></span>
      <svg class="spinner" id="spinner" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <circle cx="8" cy="8" r="6" stroke="rgba(255,255,255,.14)" stroke-width="2" />
        <path d="M8 2a6 6 0 0 1 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </svg>
      <span class="check" id="check" aria-hidden="true">
        <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2.5 6.2l2.2 2.2 4.8-5" />
        </svg>
      </span>
    </div>
    <script type="module" src="./overlay.ts"></script>
  </body>
</html>
