name: CI

on:
  push:
    branches: [main, 'build/**']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1' # tests mock electron; no binary needed
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck (shared)
        run: npm run typecheck
      - name: Typecheck (desktop)
        run: npm --workspace @wisopen/desktop run typecheck
      - name: Unit tests (integration auto-skips without a live stack)
        run: npm test

  edge-functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Typecheck Deno edge functions
        working-directory: backend/supabase/functions
        run: deno check format/index.ts stt-stream/index.ts
