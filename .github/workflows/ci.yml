name: CI

on:
  push:
    branches: [main, 'build/**']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1' # tests mock electron; no binary needed
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck (shared)
        run: npm run typecheck
      - name: Typecheck (desktop)
        run: npm --workspace @wisopen/desktop run typecheck
      - name: Unit tests (integration auto-skips without a live stack)
        run: npm test

  edge-functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Typecheck Deno edge functions
        working-directory: backend/supabase/functions
        run: deno check format/index.ts stt-stream/index.ts

  integration:
    # spins up the local Supabase stack and runs the live integration suite (mock providers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
      - name: Start Supabase + apply migrations/seed
        working-directory: backend
        run: |
          supabase start
          supabase db reset
      - name: Serve edge functions (mock providers)
        working-directory: backend
        run: |
          cp supabase/functions/.env.example supabase/functions/.env
          nohup supabase functions serve --no-verify-jwt --env-file supabase/functions/.env > /tmp/fns.log 2>&1 &
          for i in $(seq 1 30); do
            c=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://127.0.0.1:54321/functions/v1/format -d '{}' || true)
            [ "$c" = "401" ] && break; sleep 4
          done
      - name: Run integration suite
        run: |
          # `-o env` is the stable shell-consumption format (ANON_KEY/API_URL/SERVICE_ROLE_KEY)
          eval "$(cd backend && supabase status -o env)"
          export SUPABASE_URL="$API_URL"
          export SUPABASE_ANON_KEY="$ANON_KEY"
          export SUPABASE_SERVICE_ROLE_KEY="$SERVICE_ROLE_KEY"
          export FUNCTIONS_URL="$API_URL/functions/v1"
          test -n "$SUPABASE_ANON_KEY" || { echo "::error::no ANON_KEY from supabase status"; exit 1; }
          npx vitest run backend/tests --no-file-parallelism
