name: Build & release installers

on:
  push:
    tags: ['v*'] # tagging vX.Y.Z builds + publishes ONE GitHub Release (apps auto-update from it)
  workflow_dispatch: # manual run builds artifacts without publishing

permissions:
  contents: write

jobs:
  # Build installers + update metadata (latest*.yml) on each platform, as artifacts.
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            script: build:mac
          - os: windows-latest
            script: build:win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build installers (signed only if cert secrets are present)
        shell: bash # Windows runners default to PowerShell
        run: |
          if [ -n "$MAC_CSC_LINK" ]; then
            export CSC_LINK="$MAC_CSC_LINK" CSC_KEY_PASSWORD="$MAC_CSC_KEY_PASSWORD" CSC_IDENTITY_AUTO_DISCOVERY=true
          else
            export CSC_IDENTITY_AUTO_DISCOVERY=false
          fi
          if [ -n "$WIN_CSC_LINK_S" ]; then
            export WIN_CSC_LINK="$WIN_CSC_LINK_S" WIN_CSC_KEY_PASSWORD="$WIN_CSC_KEY_PASSWORD_S"
          fi
          npm --workspace @wisopen/desktop run ${{ matrix.script }}
        env:
          # macOS signing+notarization — active once these Apple secrets are set
          MAC_CSC_LINK: ${{ secrets.CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows code-signing (optional; auto-update works unsigned)
          WIN_CSC_LINK_S: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD_S: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
      - uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/*.exe
            apps/desktop/release/*.blockmap
            apps/desktop/release/latest*.yml
          if-no-files-found: error

  # On a tag: gather all platforms' artifacts and publish exactly ONE Release.
  release:
    needs: build
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" dist/* \
            --repo W3stbrook/wisopen \
            --title "${{ github.ref_name }}" \
            --notes "Automated release ${{ github.ref_name }}. Auto-update enabled (Windows now; macOS once code-signing secrets are configured)." \
            --latest
