name: Build & release installers

on:
  push:
    tags: ['v*'] # tagging vX.Y.Z publishes a GitHub Release (apps auto-update from it)
  workflow_dispatch: # manual run builds artifacts without publishing

permissions:
  contents: write # needed for electron-builder to create the GitHub Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            release: release:mac
            build: build:mac
          - os: windows-latest
            release: release:win
            build: build:win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      # On a tag: build, sign (if secrets present) and PUBLISH to the GitHub Release.
      - name: Release (publish to GitHub Releases)
        if: github.ref_type == 'tag'
        run: npm --workspace @wisopen/desktop run ${{ matrix.release }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing+notarization — unsigned until these Apple secrets are set.
          # When present, also set CSC_IDENTITY_AUTO_DISCOVERY=true to enable signing.
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.APPLE_API_KEY != '' && 'true' || 'false' }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows code-signing (optional; auto-update works unsigned)
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      # Manual run: build installers without publishing, upload as artifacts.
      - name: Build (no publish)
        if: github.ref_type != 'tag'
        run: npm --workspace @wisopen/desktop run ${{ matrix.build }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - name: Upload artifacts
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: wisopen-${{ matrix.os }}
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/*.exe
            apps/desktop/release/*.blockmap
          if-no-files-found: warn
